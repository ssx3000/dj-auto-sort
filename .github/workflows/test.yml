name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install base + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .

      - name: Run tests (without Essentia)
        run: |
          pytest -v -m "not needs_essentia and not needs_fixtures_audio"

  test-with-essentia:
    # essentia-tensorflow ships manylinux wheels only — no Windows wheels on PyPI.
    # Analysis code is OS-agnostic, so we run these tests on Linux.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Qt runtime libs for pytest-qt
        # pytest-qt imports QtGui at pytest-configure time; on headless Ubuntu
        # that needs libEGL + libGL. Without them pytest fails before any tests
        # collect, even though the Essentia tests themselves don't touch Qt.
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install with analysis-full extra
        # --pre: essentia-tensorflow only publishes .devN pre-releases on PyPI,
        # which pip skips without this flag.
        run: |
          python -m pip install --upgrade pip
          pip install --pre -e ".[dev,analysis-full]"

      - name: Run Essentia-gated tests
        run: |
          pytest -v -m "needs_essentia"
